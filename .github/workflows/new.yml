name: Wayback Exfiltrate to Repo
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Environment
        run: |
          git config --global user.name "Exfiltrator-Bot"
          git config --global user.email "bot@ops.local"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          mkdir -p oversized_files
          mkdir -p alagappauniversity.ac.in
          touch oversized_files/skipped_links.txt

      - name: Get Archive File List (2023 to Present)
        run: |
          DOMAIN="alagappauniversity.ac.in"
          # Added &from=20230101 to filter for files archived since 2023
          curl -s "https://web.archive.org/cdx/search/cdx?url=$DOMAIN/*&output=text&fl=original&collapse=urlkey&from=20230101000000" | \
          grep -E "\.pdf|\.docx|\.xlsx|\.zip|\.rar|\.sql|\.bak|\.7z|\.doc|\.xls|\.ppt" > file_list.txt || true
          
          echo "Found $(wc -l < file_list.txt) files processed since Jan 2023."

      - name: Process and Upload in Batches
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_PAT }} 
        run: |
          USER_NAME="karthik3259m-ops"
          REPO_NAME="college-site"
          REMOTE_URL="https://x-access-token:${GH_TOKEN}@github.com/${USER_NAME}/${REPO_NAME}.git"
          
          count=0
          batch_size=50
          set +e 

          while read -r original_url; do
            # Direct download link for the most recent version
            wayback_url="https://web.archive.org/web/20260000000000if_/$original_url"
            
            clean_path=$(echo "$original_url" | sed 's|https\?://||g' | sed 's/%20/ /g')
            dir_path="alagappauniversity.ac.in/$(dirname "$clean_path")"
            file_name=$(basename "$clean_path")
            
            if [ -f "$dir_path/$file_name" ]; then continue; fi

            mkdir -p "$dir_path"
            curl -L --retry 2 --max-time 60 -s -o "temp_file" "$wayback_url"

            if [ -f "temp_file" ]; then
              filesize=$(stat -c%s "temp_file")
              
              if [ $filesize -gt 94371840 ]; then
                echo "$original_url | $filesize" >> oversized_files/skipped_links.txt
                rm temp_file
                continue
              fi

              if [ $filesize -lt 100 ]; then rm temp_file; continue; fi

              mv temp_file "$dir_path/$file_name"
              ((count++))
              echo "Downloaded ($count): $file_name"
            fi

            if [ $count -ge $batch_size ]; then
              echo "Batch full. Syncing..."
              git add .
              if ! git diff --cached --quiet; then
                git commit -m "Exfiltrated batch (Post-2023): $count files"
                git pull --rebase $REMOTE_URL main
                git push $REMOTE_URL HEAD:main
                count=0 
              fi
            fi

          done < file_list.txt

          # Final cleanup
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Final sync (Post-2023 files)"
            git pull --rebase $REMOTE_URL main
            git push $REMOTE_URL HEAD:main
          fi
