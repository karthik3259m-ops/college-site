name: Wayback Exfiltrate to Repo
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Environment
        run: |
          sudo apt-get install -y curl grep
          # Ensure directories exist so the script doesn't crash on write
          mkdir -p oversized_files
          touch oversized_files/skipped_links.txt
          git config --global user.name "Exfiltrator-Bot"
          git config --global user.email "bot@ops.local"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Get Archive File List
        run: |
          DOMAIN="alagappauniversity.ac.in"
          curl -s "https://web.archive.org/cdx/search/cdx?url=$DOMAIN/*&output=text&fl=original&collapse=urlkey" | \
          grep -E "\.pdf|\.docx|\.xlsx|\.zip|\.rar|\.sql|\.bak|\.7z|\.doc|\.xls|\.ppt" > file_list.txt
          echo "Found $(wc -l < file_list.txt) files to process."

      - name: Process and Upload in Batches
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_PAT }} 
        run: |
          count=0
          batch_size=50

          while read -r original_url; do
            # Construct Wayback URL
            wayback_url="https://web.archive.org/web/20260000000000if_/$original_url"
            
            # Clean path and handle spaces/special chars
            clean_path=$(echo "$original_url" | sed 's|https\?://||g' | sed 's/%20/ /g')
            dir_path="alagappauniversity.ac.in/$(dirname "$clean_path")"
            file_name=$(basename "$clean_path")
            
            # 1. Skip if already exists
            if [ -f "$dir_path/$file_name" ]; then continue; fi

            # 2. Download to temp
            mkdir -p "$dir_path"
            curl -L --retry 3 -s -o "temp_file" "$wayback_url"

            if [ -f "temp_file" ]; then
              filesize=$(stat -c%s "temp_file")
              
              # Size check (90MB)
              if [ $filesize -gt 94371840 ]; then
                echo "$original_url" >> oversized_files/skipped_links.txt
                rm temp_file
                continue
              fi

              # Small file check
              if [ $filesize -lt 100 ]; then rm temp_file; continue; fi

              mv temp_file "$dir_path/$file_name"
              ((count++))
              echo "Downloaded ($count): $file_name"
            fi

            # 3. Batch Push logic
            if [ $((count % batch_size)) -eq 0 ] && [ $count -ne 0 ]; then
              echo "Reached $count files. Attempting sync..."
              git add .
              # Only commit if there are actually staged changes
              if ! git diff --cached --quiet; then
                git commit -m "Exfiltrated batch: $count files"
                git pull --rebase origin main
                git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git HEAD:main
                # Reset counter after successful push to keep batches clean
                count=0 
              fi
            fi

          done < file_list.txt

          # Final Sync for any leftovers
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Final batch completion"
            git pull --rebase origin main
            git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git HEAD:main
          fi
